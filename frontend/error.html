<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waymo Agent | Error</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">

    <script>
        // built-in dictionary of standard web errors
        const errorDictionary = {
            "401": "Unauthorized. You do not have permission to view this page.",
            "403": "Forbidden. Access to this resource is denied.",
            "404": "The page or resource you are looking for does not exist.",
            "500": "Internal Server Error. The server encountered an unexpected condition."
        };

        // read URL parameters
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code') || 'Unknown Error';
        const detail = params.get('detail');

        // update page title and heading
        document.title = `Waymo Agent | ${code}`;
        document.getElementById('error-code').textContent = code;

        // use dictionary description, or a generic one
        document.getElementById('error-desc').textContent = errorDictionary[code] || "Something went wrong while routing your request.";

        // if provided, show specific dynamic Python error
        if (detail) {
            const detailEl = document.getElementById('error-detail');
            detailEl.textContent = `Server Details: ${detail}`;
            detailEl.classList.remove('hidden');
        }
    </script>
</head>
<body>
    <div class="error-page">
        <h1>404</h1>
        <p>The page you are looking for has either been moved or does not exist.</p>
        <a href="/">Return to Dashboard</a>
    </div>
</body>
</html>
