<!--
Component: Authentication & Recovery Modals
Description: A unified interface containing both the local administrator sign-in form and the catastrophic factory reset recovery modal.
Dependencies: style.css, theme.css, auth.js, api.js
Author: Hugh Brennan
Date: 2026-04-23
Usage: Injected dynamically by FastAPI into the div id="auth-modals-placeholder" container within index.html.
-->
<div id="login-overlay" class="modal-overlay hidden">
    <div class="modal-content text-center">
        <h2 class="text-accent mt-0">Waymo Agent</h2>
        <h1>Sign in</h1>
        <p class="text-muted">Use your Local Admin Account</p>
        
        <form id="login-form">
            <div class="input-group">
                <input type="text" id="login-user" placeholder="Username" autocomplete="username" required>
            </div>
            <div class="input-group">
                <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password" required>
            </div>
            
            <div id="login-error" class="error-text hidden"></div>
            
            <button type="submit" class="btn-primary w-100 mt-1">Login</button>

            <div class="mt-15">
                <a href="#" id="link-forgot-password" class="text-muted text-sm" style="text-decoration: none;">Forgot Password?</a>
            </div>
        </form>
    </div>
</div>

<div id="reset-overlay" class="modal-overlay hidden">
    <div class="modal-content border-error">
        <h2 class="text-error mt-0">System Recovery</h2>
        <p>If you have lost your local admin password, you must perform a factory reset.</p>

        <div class="input-group mt-15">
            <label class="text-muted text-sm">Email Recovery (Coming Soon)</label>
            <input type="email" placeholder="Email routing not yet configured" disabled>
        </div>

        <div class="status-alert bg-error mt-15">
            <strong>CRITICAL WARNING:</strong> Proceeding will permanently wipe all configurations, delete your saved API keys, and destroy the SQLite database.
        </div>

        <div id="reset-error" class="error-text hidden mt-1"></div>

        <div class="form-grid-2 mt-15">
            <button id="btn-cancel-reset" class="btn-outline w-100">Cancel</button>
            <button id="btn-confirm-reset" class="btn-primary w-100" style="background: var(--error-color);">Wipe & Reset</button>
        </div>
    </div>
</div>
