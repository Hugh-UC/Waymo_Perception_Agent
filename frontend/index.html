<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waymo Perception Agent | Dashboard</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="auth-placeholder"></div>
    
    <div id="setup-placeholder"></div>

    <div id="app-container" class="hidden">
        
        <nav class="top-nav">
            <div class="nav-brand">Waymo Agent v0.1</div>
            <div class="nav-links">
                <a href="/" class="active">Dashboard</a>
                <a href="/graphs.html">Graphs</a>
                <a href="/settings.html">Settings</a>
                <a href="/export.html">Export</a>
            </div>
            <div class="theme-toggle">
                <button id="btn-theme-toggle" class="btn-nav">🌗 Theme</button>
                <button id="btn-logout" class="btn-nav hidden" style="margin-left: 10px;">Log Out</button>
            </div>
        </nav>

        <main class="dashboard-grid">
            <header class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h1>System Dashboard</h1>
                <button class="btn-primary" style="width: auto;">Run Scraper Now</button>
            </header>

            <div class="settings-layout">
                
                <aside class="settings-sidebar">
                    <button class="sidebar-btn active" data-target="panel-overview">Overview</button>
                    <button class="sidebar-btn" data-target="panel-health">System Health</button>
                </aside>

                <div class="settings-content">
                    <div id="panel-overview" class="settings-section">
                        <h2>Metrics Summary</h2>
                        <div class="dashboard-summary-grid">
                            <div class="stat-card">
                                <h3>Total Runs</h3>
                                <p class="stat-value">--</p>
                            </div>
                            <div class="stat-card">
                                <h3>Sources Analysed</h3>
                                <p class="stat-value">--</p>
                            </div>
                        </div>
                    </div>
                    
                    <div id="panel-health" class="settings-section hidden">
                        <h2>System Health</h2>
                        <p>API Connectivity: <span style="color: var(--success-text); font-weight: bold;">Healthy</span></p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/datalist.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // Simple Sidebar Toggle Logic
        document.querySelectorAll('.sidebar-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.settings-section').forEach(s => s.classList.add('hidden'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
